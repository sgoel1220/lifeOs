<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeOS Capture</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ─── Header (always visible) ─────────────────────── -->
  <div class="header">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C7 2 3 7 3 12s4 10 9 10c1.8 0 3.5-.5 5-1.4"/>
        <path d="M12 2c2.5 3 4 6.5 4 10 0 1.2-.2 2.4-.5 3.5"/>
        <path d="M3 12h18"/>
        <circle cx="12" cy="12" r="2.5" fill="currentColor" stroke="none"/>
      </svg>
      LifeOS
    </div>
    <div class="header-right">
      <!-- shown only in capture screen -->
      <button class="icon-btn" id="btnSettings" title="Settings" style="display:none">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                   a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                   A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                   l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                   A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                   l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                   a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                   l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                   a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ─── Loading screen ───────────────────────────────── -->
  <div id="screenLoading" class="screen">
    <div class="loading-body">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- ─── Sign-in screen ───────────────────────────────── -->
  <div id="screenSignIn" class="screen" style="display:none">
    <div class="signin-body">
      <div class="signin-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C7 2 3 7 3 12s4 10 9 10c1.8 0 3.5-.5 5-1.4"/>
          <path d="M12 2c2.5 3 4 6.5 4 10 0 1.2-.2 2.4-.5 3.5"/>
          <path d="M3 12h18"/>
          <circle cx="12" cy="12" r="2.5" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      <h2 class="signin-title">Welcome to LifeOS</h2>
      <p class="signin-desc">Sign in to start capturing thoughts, links, and ideas from anywhere.</p>
      <button class="btn-signin" id="btnSignIn">
        Sign in to LifeOS
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
      <p class="signin-hint" id="signinHint" style="display:none">
        Signed in? Click the extension icon again.
      </p>
    </div>
    <!-- Settings link for URL config -->
    <div class="signin-footer">
      <button class="link-btn" id="btnSignInSettings">Configure API URL</button>
      <div id="signinSettingsPanel" class="signin-settings" style="display:none">
        <div class="field">
          <label>API URL</label>
          <input type="url" id="signinApiUrl"
                 placeholder="https://lifeos-web-production.up.railway.app" />
        </div>
        <button class="btn-save-small" id="btnSaveSigninSettings">Save &amp; retry</button>
      </div>
    </div>
  </div>

  <!-- ─── Capture screen ───────────────────────────────── -->
  <div id="screenCapture" class="screen" style="display:none">
    <div class="body">

      <!-- URL context chip -->
      <div class="url-chip" id="urlChip">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <span class="url-text" id="urlText" title=""></span>
        <button class="chip-remove" id="chipRemove" title="Remove URL context">✕</button>
      </div>

      <!-- Textarea -->
      <textarea
        id="textarea"
        placeholder="What's on your mind…&#10;&#10;Use #tags · ⌘↩ to capture"
        rows="5"
        spellcheck="true"
        autofocus
      ></textarea>

      <!-- Status -->
      <div id="status" class="status"></div>

      <!-- Actions -->
      <div class="actions">
        <button class="btn-dictate" id="btnDictate" title="Voice dictation">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
          <span id="dictateLabel">Dictate</span>
        </button>
        <button class="btn-capture" id="btnCapture">Capture&nbsp;→</button>
      </div>

      <!-- Settings section -->
      <div class="settings-section">
        <div class="settings-header" id="settingsHeader">
          <span class="settings-title">Settings</span>
          <span class="settings-chevron" id="settingsChevron">▼</span>
        </div>
        <div class="settings-body" id="settingsBody">
          <div class="field">
            <label>API URL</label>
            <input type="url" id="apiUrlInput"
                   placeholder="https://lifeos-web-production.up.railway.app" />
          </div>
          <div class="field">
            <label>API Key <span class="field-note">(optional — leave blank to use website session)</span></label>
            <input type="password" id="apiKeyInput"
                   placeholder="EXTENSION_API_KEY value" />
          </div>
          <div class="settings-footer">
            <div class="conn-indicator">
              <div class="conn-dot" id="connDot"></div>
              <span id="connText">—</span>
            </div>
            <button class="btn-save" id="btnSave">Save</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
